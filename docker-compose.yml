services:
  postgres:
    image: postgres:15
    container_name: buildboard-db
    restart: always
    environment:
      POSTGRES_USER: buildboard
      POSTGRES_PASSWORD: buildboard
      POSTGRES_DB: buildboard
    ports:
      - "55432:5432"
    volumes:
      - buildboard_postgres_data:/var/lib/postgresql/data

volumes:
  buildboard_postgres_data: